name: Cloudflare preview cleanup

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete branch-preview D1
    runs-on: ubuntu-latest
    if: github.repository == 'saltbo/zpan'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Delete isolated preview D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZPAN_PREVIEW_NAME: ${{ github.event.pull_request.head.ref }}
          ZPAN_PREVIEW_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: pnpm preview:d1:cleanup
