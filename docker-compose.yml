# Build from source
# Usage: docker compose -f docker-compose.yml up -d --build

services:
  zpan:
    build: .
    ports:
      - "8222:8222"
    environment:
      - PORT=8222
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:8222}
      - DATABASE_URL=/data/zpan.db
    volumes:
      - zpan-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8222/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  downloader:
    build:
      context: .
      target: cli
    ports:
      - "${ZPAN_BT_PORT:-6881}:6881/tcp"
      - "${ZPAN_BT_PORT:-6881}:6881/udp"
    command: ["downloader", "up"]
    environment:
      - ZPAN_SERVER_URL=http://zpan:8222
      - ZPAN_DOWNLOADER_DOWNLOAD_DIR=/downloads
    volumes:
      - zpan-config:/home/zpan/.config/zpan
      - zpan-downloader-state:/home/zpan/.local/state/zpan/downloader
      - zpan-downloads:/downloads
    depends_on:
      zpan:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zpan-data:
  zpan-config:
  zpan-downloader-state:
  zpan-downloads:
