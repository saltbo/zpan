services:
  zpan:
    build: .
    image: zpan:latest
    ports:
      - "8222:8222"
    environment:
      - PORT=8222
      - BETTER_AUTH_SECRET=change-me
      - BETTER_AUTH_URL=http://localhost:8222
      - DATABASE_URL=/data/zpan.db
    volumes:
      - zpan-data:/data
    restart: unless-stopped

volumes:
  zpan-data:
