name = "zpan"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
BETTER_AUTH_SECRET = "zpan-test-secret"

[[d1_databases]]
binding = "DB"
database_name = "zpan-db"
database_id = "local"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "zpan-test"
