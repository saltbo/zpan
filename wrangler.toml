name = "zpan"
main = "./workers/bootstrap.ts"
compatibility_date = "2026-04-12"
compatibility_flags = ["nodejs_compat"]

[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Production uses zpan-db, preview versions use zpan-db-staging.
# Preview URLs (from non-production branch deploys) automatically
# use preview_database_id instead of database_id.
[[d1_databases]]
binding = "DB"
database_name = "zpan-db"
database_id = "5bd64957-fa49-4da0-8b7b-6e0ad84037e7"
preview_database_id = "a9197d7a-6524-42f0-b646-e714dcb30b3b"
migrations_dir = "./migrations"

[observability]
enabled = true
