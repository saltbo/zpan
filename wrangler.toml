name = "zpan"
main = "./workers/bootstrap.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Local development D1 binding (used by `wrangler dev`)
[[d1_databases]]
binding = "DB"
database_name = "zpan-db-local"
database_id = "local"
migrations_dir = "./migrations"

# ----------------------------------------------------------------------------
# Environment-specific config.
#
# Workers has two environments: production and preview. Top-level bindings
# apply to BOTH unless an [env.<name>] block overrides.
#
# Secrets (BETTER_AUTH_SECRET etc.) cannot live in this file. Set them via:
#   wrangler secret put BETTER_AUTH_SECRET
# ----------------------------------------------------------------------------

# --- production ---
# TODO: Update these URLs after creating the Workers project in CF Dashboard.
# Workers subdomain will be https://zpan.<account>.workers.dev or your custom domain.
[env.production.vars]
BETTER_AUTH_URL = "https://zpan.pages.dev"
TRUSTED_ORIGINS = "https://zpan.pages.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "zpan-db"
database_id = "5bd64957-fa49-4da0-8b7b-6e0ad84037e7"
migrations_dir = "./migrations"

# --- preview ---
# No BETTER_AUTH_URL / TRUSTED_ORIGINS so better-auth falls back to the
# request URL — preview deployments have per-commit subdomains and cannot
# be hardcoded here.
[env.preview.vars]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "zpan-db-preview"
database_id = "a9197d7a-6524-42f0-b646-e714dcb30b3b"
migrations_dir = "./migrations"

[observability]
enabled = true
