name = "zpan"
main = "./workers/bootstrap.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "zpan-db"
database_id = "5bd64957-fa49-4da0-8b7b-6e0ad84037e7"
migrations_dir = "./migrations"

[observability]
enabled = true

# ----------------------------------------------------------------------------
# Staging environment — used by non-production branch deploys.
# Version command in Dashboard: npx wrangler versions upload --env staging
#
# No BETTER_AUTH_URL / TRUSTED_ORIGINS so better-auth falls back to the
# request URL — staging deployments have per-commit subdomains.
#
# Secrets must be set separately:
#   wrangler secret put BETTER_AUTH_SECRET --env staging
# ----------------------------------------------------------------------------
[env.staging]
name = "zpan-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "zpan-db-staging"
database_id = "a9197d7a-6524-42f0-b646-e714dcb30b3b"
migrations_dir = "./migrations"
